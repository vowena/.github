<svg width="1280" height="360" viewBox="0 0 1280 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Vowena, trustless recurring payments built on Stellar">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F0F16"/>
      <stop offset="0.55" stop-color="#13102C"/>
      <stop offset="1" stop-color="#1A0F52"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.18" cy="0.5" r="0.45">
      <stop offset="0" stop-color="#6B4EFF" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#6B4EFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.82" cy="0.55" r="0.42">
      <stop offset="0" stop-color="#9B85FF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#9B85FF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.9" fill="#B5A8FF" fill-opacity="0.08"/>
    </pattern>
    <linearGradient id="hairline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6B4EFF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#6B4EFF" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#6B4EFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="loopGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#B5A8FF"/>
      <stop offset="1" stop-color="#6B4EFF"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="360" fill="url(#bg)"/>
  <rect width="1280" height="360" fill="url(#dots)"/>
  <rect width="1280" height="360" fill="url(#glow)"/>
  <rect width="1280" height="360" fill="url(#glow2)"/>

  <rect x="0" y="0" width="1280" height="1" fill="url(#hairline)"/>
  <rect x="0" y="359" width="1280" height="1" fill="url(#hairline)"/>

  <!-- Orbital rings, slowly rotating -->
  <g transform="translate(1000, 180)" opacity="0.55">
    <g>
      <circle r="170" fill="none" stroke="#6B4EFF" stroke-width="0.8" stroke-opacity="0.25" stroke-dasharray="1 6"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="60s" repeatCount="indefinite"/>
    </g>
    <g>
      <circle r="130" fill="none" stroke="#9B85FF" stroke-width="1" stroke-opacity="0.35" stroke-dasharray="3 8"/>
      <circle r="3" cx="130" cy="0" fill="#B5A8FF" fill-opacity="0.9"/>
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="42s" repeatCount="indefinite"/>
    </g>
    <g>
      <circle r="92" fill="none" stroke="#6B4EFF" stroke-width="1" stroke-opacity="0.55"/>
      <circle r="3" cx="92" cy="0" fill="#6B4EFF"/>
      <circle r="2" cx="-65" cy="-65" fill="#9B85FF" fill-opacity="0.7"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="28s" repeatCount="indefinite"/>
    </g>
    <circle r="6" fill="#6B4EFF">
      <animate attributeName="r" values="6;8;6" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="fill-opacity" values="0.95;0.5;0.95" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Loop symbol, scaled up, traces itself -->
  <g transform="translate(110, 110) scale(2.1)">
    <path d="M44 18C44 18 28 22 24 40C20 58 36 62 36 62" stroke="url(#loopGrad)" stroke-width="4.5" stroke-linecap="round" fill="none" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1">
      <animate attributeName="stroke-dashoffset" from="1" to="0" dur="3.2s" begin="0s" fill="freeze"/>
    </path>
    <path d="M36 62C36 62 52 58 56 40C60 22 44 18 44 18" stroke="#6B4EFF" stroke-width="4.5" stroke-linecap="round" fill="none" opacity="0.45" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1">
      <animate attributeName="stroke-dashoffset" from="1" to="0" dur="3.2s" begin="0.4s" fill="freeze"/>
    </path>
    <circle cx="40" cy="40" r="3.5" fill="#B5A8FF" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.2s" dur="0.5s" fill="freeze"/>
      <animate attributeName="r" values="3.5;5;3.5" dur="2.4s" begin="3.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Wordmark -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', Inter, sans-serif" fill="#F4F4F5">
    <text x="320" y="180" font-size="84" font-weight="700" letter-spacing="-3.2" opacity="0">
      vowena
      <animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="0.9s" fill="freeze"/>
    </text>
    <text x="322" y="216" font-size="11" font-weight="700" letter-spacing="3.2" fill="#B5A8FF" opacity="0">
      TRUSTLESS RECURRING PAYMENTS  ·  STELLAR  ·  SOROBAN
      <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.9s" fill="freeze"/>
    </text>
    <line x1="322" y1="232" x2="380" y2="232" stroke="#6B4EFF" stroke-width="2" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" from="0" to="0.9" begin="1.4s" dur="0.6s" fill="freeze"/>
    </line>
    <text x="322" y="270" font-size="20" font-weight="400" fill="#C5C0D8" opacity="0">
      Subscriptions on chain. Pull billing. No intermediary.
      <animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.9s" fill="freeze"/>
    </text>
    <text x="322" y="304" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="11" letter-spacing="1.2" fill="#807C90" opacity="0">
      $ npm install @vowena/sdk
      <animate attributeName="opacity" from="0" to="1" begin="2s" dur="0.9s" fill="freeze"/>
    </text>
  </g>
</svg>
