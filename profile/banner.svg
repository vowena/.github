<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-label="vowena – trustless recurring payments, built on Stellar">
  <title>vowena</title>
  <desc>Vowena hero banner: violet gradient with the Vowena loop mark, wordmark, and orbital rings suggesting recurrence.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F0F16"/>
      <stop offset="55%" stop-color="#150E36"/>
      <stop offset="100%" stop-color="#1A0F52"/>
    </linearGradient>

    <radialGradient id="glow" cx="0.78" cy="0.5" r="0.55">
      <stop offset="0%" stop-color="#6B4EFF" stop-opacity="0.28"/>
      <stop offset="55%" stop-color="#3F24C7" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#1A0F52" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="leftGlow" cx="0.18" cy="0.85" r="0.6">
      <stop offset="0%" stop-color="#6B4EFF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0F0F16" stop-opacity="0"/>
    </radialGradient>

    <pattern id="dotgrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#FFFFFF" fill-opacity="0.04"/>
    </pattern>

    <linearGradient id="hairline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6B4EFF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#6B4EFF" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#6B4EFF" stop-opacity="0"/>
    </linearGradient>

    <symbol id="loop" viewBox="0 0 80 80">
      <path d="M44 18C44 18 28 22 24 40C20 58 36 62 36 62" stroke="#6B4EFF" stroke-width="4.5" stroke-linecap="round" fill="none"/>
      <path d="M36 62C36 62 52 58 56 40C60 22 44 18 44 18" stroke="#6B4EFF" stroke-width="4.5" stroke-linecap="round" fill="none" opacity="0.4"/>
      <circle cx="40" cy="40" r="3" fill="#6B4EFF"/>
    </symbol>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#dotgrid)"/>
  <rect width="1280" height="320" fill="url(#leftGlow)"/>
  <rect width="1280" height="320" fill="url(#glow)"/>

  <!-- Top hairline -->
  <rect x="0" y="0" width="1280" height="1" fill="url(#hairline)"/>

  <!-- Right side orbital rings (recurrence metaphor) -->
  <g transform="translate(980 160)" fill="none" stroke="#6B4EFF" stroke-linecap="round">
    <ellipse cx="0" cy="0" rx="170" ry="170" stroke-opacity="0.10" stroke-width="1"/>
    <ellipse cx="0" cy="0" rx="130" ry="130" stroke-opacity="0.16" stroke-width="1"/>
    <ellipse cx="0" cy="0" rx="92" ry="92" stroke-opacity="0.22" stroke-width="1"/>

    <!-- Dashed orbit suggesting motion -->
    <ellipse cx="0" cy="0" rx="148" ry="148" stroke="#B5A8FF" stroke-opacity="0.32" stroke-width="1.25" stroke-dasharray="2 8"/>

    <!-- Orbiting nodes -->
    <circle cx="92" cy="0" r="3.5" fill="#B5A8FF" stroke="none"/>
    <circle cx="-130" cy="0" r="2.5" fill="#6B4EFF" stroke="none" opacity="0.7"/>
    <circle cx="0" cy="-170" r="2" fill="#B5A8FF" stroke="none" opacity="0.6"/>

    <!-- Center loop mark scaled up -->
    <g transform="translate(-70 -70) scale(1.75)">
      <use href="#loop" width="80" height="80"/>
    </g>
  </g>

  <!-- Left content block -->
  <g transform="translate(96 116)">
    <!-- Inline loop mark next to wordmark -->
    <g transform="translate(0 -8)">
      <use href="#loop" width="64" height="64"/>
    </g>

    <!-- Wordmark -->
    <text x="80" y="40"
          font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
          font-weight="600"
          font-size="68"
          letter-spacing="-2.04"
          fill="#F4F4F5">vowena</text>

    <!-- Tagline -->
    <text x="2" y="100"
          font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
          font-weight="400"
          font-size="20"
          letter-spacing="-0.2"
          fill="#B0ADBF">trustless recurring payments, built on Stellar</text>

    <!-- Section label -->
    <g transform="translate(2 138)">
      <rect x="0" y="0" width="8" height="8" rx="2" fill="#6B4EFF"/>
      <text x="20" y="8"
            font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
            font-weight="600"
            font-size="11"
            letter-spacing="1.54"
            fill="#807C90">PROTOCOL  ·  SDK  ·  DASHBOARD</text>
    </g>
  </g>

  <!-- Bottom hairline -->
  <rect x="0" y="319" width="1280" height="1" fill="url(#hairline)"/>
</svg>
