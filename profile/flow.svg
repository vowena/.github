<svg width="1280" height="320" viewBox="0 0 1280 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Vowena subscription lifecycle: plan, subscribe, allowance, charge, settle">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0F0F16"/>
      <stop offset="0.5" stop-color="#13102C"/>
      <stop offset="1" stop-color="#0F0F16"/>
    </linearGradient>
    <linearGradient id="rail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6B4EFF" stop-opacity="0"/>
      <stop offset="0.06" stop-color="#6B4EFF" stop-opacity="0.6"/>
      <stop offset="0.94" stop-color="#6B4EFF" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#6B4EFF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="nodeGlow">
      <stop offset="0" stop-color="#6B4EFF" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#6B4EFF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.9" fill="#B5A8FF" fill-opacity="0.06"/>
    </pattern>
  </defs>

  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#dots)"/>

  <!-- Header -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', Inter, sans-serif" text-anchor="middle">
    <text x="640" y="48" font-size="11" font-weight="700" letter-spacing="3.2" fill="#B5A8FF">THE LIFECYCLE</text>
    <text x="640" y="80" font-size="22" font-weight="600" fill="#F4F4F5" letter-spacing="-0.5">One signature. Recurring on chain forever.</text>
  </g>

  <!-- Rail line -->
  <line x1="160" y1="170" x2="1120" y2="170" stroke="url(#rail)" stroke-width="2"/>

  <!-- Traveling pulse -->
  <circle r="5" fill="#B5A8FF">
    <animateMotion dur="6s" repeatCount="indefinite" rotate="auto" path="M160,170 L1120,170"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.06;0.94;1" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle r="14" fill="url(#nodeGlow)">
    <animateMotion dur="6s" repeatCount="indefinite" path="M160,170 L1120,170"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.06;0.94;1" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- 5 stations: PLAN, SUBSCRIBE, ALLOWANCE, CHARGE, SETTLE -->
  <!-- Station 1: PLAN -->
  <g transform="translate(160, 170)">
    <circle r="32" fill="#0F0F16" stroke="#6B4EFF" stroke-width="2"/>
    <circle r="38" fill="none" stroke="#6B4EFF" stroke-width="0.5" stroke-opacity="0.3" stroke-dasharray="2 3"/>
    <g transform="translate(-10, -10)">
      <rect x="0" y="0" width="20" height="20" rx="2" stroke="#B5A8FF" stroke-width="1.5" fill="none"/>
      <line x1="4" y1="6" x2="14" y2="6" stroke="#B5A8FF" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="4" y1="10" x2="12" y2="10" stroke="#B5A8FF" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="4" y1="14" x2="10" y2="14" stroke="#B5A8FF" stroke-width="1.2" stroke-linecap="round"/>
    </g>
    <g font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">
      <text y="-50" font-size="10" font-weight="700" letter-spacing="2.2" fill="#6B4EFF">01</text>
      <text y="68" font-size="14" font-weight="600" fill="#F4F4F5">Plan</text>
      <text y="86" font-size="11" fill="#807C90">Merchant defines terms</text>
    </g>
  </g>

  <!-- Station 2: SUBSCRIBE -->
  <g transform="translate(400, 170)">
    <circle r="32" fill="#0F0F16" stroke="#6B4EFF" stroke-width="2"/>
    <circle r="38" fill="none" stroke="#6B4EFF" stroke-width="0.5" stroke-opacity="0.3" stroke-dasharray="2 3"/>
    <g transform="translate(-11, -10)" stroke="#B5A8FF" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 6h18v12a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"/>
      <path d="M2 6l9 6 9-6"/>
    </g>
    <g font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">
      <text y="-50" font-size="10" font-weight="700" letter-spacing="2.2" fill="#6B4EFF">02</text>
      <text y="68" font-size="14" font-weight="600" fill="#F4F4F5">Subscribe</text>
      <text y="86" font-size="11" fill="#807C90">Wallet signs once</text>
    </g>
  </g>

  <!-- Station 3: ALLOWANCE -->
  <g transform="translate(640, 170)">
    <circle r="36" fill="#0F0F16" stroke="#B5A8FF" stroke-width="2"/>
    <circle r="44" fill="none" stroke="#B5A8FF" stroke-width="0.5" stroke-opacity="0.4" stroke-dasharray="2 3"/>
    <g transform="translate(-11, -11)" stroke="#B5A8FF" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="8" cy="8" r="6"/>
      <path d="M14 14l8 8M18 18l4-4M22 14l2 2"/>
    </g>
    <g font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">
      <text y="-56" font-size="10" font-weight="700" letter-spacing="2.2" fill="#B5A8FF">03</text>
      <text y="74" font-size="14" font-weight="600" fill="#F4F4F5">Allowance</text>
      <text y="92" font-size="11" fill="#807C90">SAC pre-approval</text>
    </g>
  </g>

  <!-- Station 4: CHARGE -->
  <g transform="translate(880, 170)">
    <circle r="32" fill="#0F0F16" stroke="#6B4EFF" stroke-width="2"/>
    <circle r="38" fill="none" stroke="#6B4EFF" stroke-width="0.5" stroke-opacity="0.3" stroke-dasharray="2 3">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="14s" repeatCount="indefinite"/>
    </circle>
    <g transform="translate(-11, -11)" stroke="#B5A8FF" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 12a9 9 0 0117-4l2-3M21 12a9 9 0 01-17 4l-2 3"/>
      <path d="M22 5v4h-4M2 19v-4h4"/>
    </g>
    <g font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">
      <text y="-50" font-size="10" font-weight="700" letter-spacing="2.2" fill="#6B4EFF">04</text>
      <text y="68" font-size="14" font-weight="600" fill="#F4F4F5">Charge</text>
      <text y="86" font-size="11" fill="#807C90">Permissionless</text>
    </g>
  </g>

  <!-- Station 5: SETTLE -->
  <g transform="translate(1120, 170)">
    <circle r="32" fill="#0F0F16" stroke="#00DC82" stroke-width="2"/>
    <circle r="38" fill="none" stroke="#00DC82" stroke-width="0.5" stroke-opacity="0.4" stroke-dasharray="2 3"/>
    <g transform="translate(-9, -8)" stroke="#00DC82" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 9l5 5 11-12"/>
    </g>
    <g font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">
      <text y="-50" font-size="10" font-weight="700" letter-spacing="2.2" fill="#00DC82">05</text>
      <text y="68" font-size="14" font-weight="600" fill="#F4F4F5">Settle</text>
      <text y="86" font-size="11" fill="#807C90">USDC moves on chain</text>
    </g>
  </g>

  <!-- Footer caption -->
  <g font-family="system-ui, -apple-system, sans-serif" text-anchor="middle" fill="#6E6894">
    <text x="640" y="282" font-size="11" letter-spacing="0.4">No intermediary holds funds. Cancel any time, from any wallet.</text>
  </g>
</svg>
